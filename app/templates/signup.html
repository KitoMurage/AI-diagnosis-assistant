{% extends "base.html" %}

{% block title %}Provider Registration{% endblock %}
{% block body_class %}auth-body{% endblock %}

{% block content %}
<div class="auth-box">
    <h2 style="text-align: center; color: #2c3e50; margin-bottom: 10px;">Provider Registration</h2>
    <p style="text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 25px;">Create your secure clinical account</p>
    
    <form action="/signup" method="POST">
        <div class="form-group">
            <label>Choose Username</label>
            <input type="text" name="username" required>
        </div>
        
        <div class="form-group">
            <label>Department / Specialty</label>
            <select name="department" required>
                <option value="General Practice">General Practice</option>
                <option value="Pulmonology">Pulmonology</option>
                <option value="Emergency Medicine">Emergency Medicine</option>
                <option value="Internal Medicine">Internal Medicine</option>
            </select>
        </div>

        <div class="form-group">
            <label>Create Password</label>
            <input type="password" name="password" minlength="6" required>
        </div>
        
        <button type="submit" class="btn-block">Create Account</button>
    </form>

    <div class="link-text">
        Already have an account? <a href="/login">Back to Login</a>
    </div>
</div>
{% endblock %}
