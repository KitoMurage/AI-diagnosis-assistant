<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Portal Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; font-family: 'Segoe UI', sans-serif;}
        .auth-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #2c3e50; font-weight: bold; font-size: 14px;}
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; outline: none; transition: 0.3s;}
        input:focus { border-color: #3498db; }
        .btn-block { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;}
        .btn-block:hover { background: #1a252f; }
        
        /* Flash Message Styles */
        .alert { padding: 12px; border-radius: 5px; margin-bottom: 20px; text-align: center; font-size: 14px; font-weight: bold; }
        .alert-error { background-color: #fce4e4; color: #cc0033; border: 1px solid #fcc2c3; }
        .alert-success { background-color: #e0f8e9; color: #27ae60; border: 1px solid #c3e6cb; }
        .link-text { text-align: center; margin-top: 20px; font-size: 14px; }
        .link-text a { color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2 style="text-align: center; color: #2c3e50; margin-bottom: 20px;"><i class="fas fa-stethoscope"></i> Ambient Copilot</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form action="/login" method="POST">
            <div class="form-group">
                <label>Doctor ID / Username</label>
                <input type="text" name="username" placeholder="e.g. dr_jenkins" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-block">Secure Login</button>
        </form>

        <div class="link-text">
            Don't have an account? <a href="/signup">Register here</a>
        </div>
    </div>
</body>
</html>
