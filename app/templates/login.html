{% extends "base.html" %}

{% block title %}Doctor Login{% endblock %}
{% block body_class %}auth-body{% endblock %}

{% block content %}
<div class="auth-box">
    <h2 style="text-align: center; color: #2c3e50; margin-bottom: 20px;">Provider Login</h2>
    <form action="/login" method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-block">Secure Login</button>
    </form>
    <div class="link-text">Don't have an account? <a href="/signup">Register here</a></div>
</div>
{% endblock %}
